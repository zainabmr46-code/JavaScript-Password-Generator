<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">


</head>
<body>

    <div class="container">
        <h1>Password Generator</h1>
        <div class="inputBox">
  <input type="text" class="passBox" id="inputBox" disabled>
  <span class="material-icons" id="copyIcon">content_copy</span>
  



</div>


        <div>
            <input type="range" min="1" max="30" value="8" class="range" 
            id="inputSlider">
        </div>
        <div class="row">
            <p>Password Length</p>
            <span id="sliderValue">4</span>
        </div>
        <div class="row">
            <label for="Lowercases">Include Lowercase Letters (a-z)</label>
            <input type="checkbox" name="Lowercase" id="Lowercase">
        </div>
        <div class="row">
            <label for="Uppercases">Include Uppercase Letters (A-Z)</label>
            <input type="checkbox" name="Uppercase" id="Uppercase">
        </div>
        <div class="row">
            <label for="Numbers">Include Numbers (0-9)</label>
            <input type="checkbox" name="Numbers" id="Numbers">
        </div>
        <div class="row">
            <label for="Symbols">Include Symbols (@-*)</label>
            <input type="checkbox" name="Symbols" id="Symbols">
        </div>
        <button type="button" class="btn" id="btn">
            Generate Password
        </button>
    </div>
    <script src="operate.js"></script>
</body>
</html>
